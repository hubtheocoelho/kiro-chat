name: Promote staging → main

# Promoção controlada: cada push em `staging` mantém um PR aberto para `main`.
# NÃO há auto-merge aqui de propósito — a branch protection de `main` exige
# 1 aprovação humana, então este PR fica parado até você revisar e fundir.

on:
  push:
    branches: ["staging"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-to-main
  cancel-in-progress: false

jobs:
  open-promotion-pr:
    name: Manter PR staging → main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Abrir/atualizar PR de promoção
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Nada a promover se staging == main.
          if git fetch origin main staging >/dev/null 2>&1 && \
             [ "$(git rev-parse origin/staging)" = "$(git rev-parse origin/main)" ]; then
            echo "staging já está em main — nada a promover."
            exit 0
          fi

          PR=$(gh pr list --repo "$GITHUB_REPOSITORY" \
                 --head staging --base main --state open \
                 --json number --jq '.[0].number // empty')

          if [ -z "$PR" ]; then
            gh pr create --repo "$GITHUB_REPOSITORY" \
              --base main --head staging \
              --title "promote: staging → main" \
              --body $'Promoção de **staging** para **main**.\n\nExige aprovação humana (branch protection). Depois de fundir, marque uma tag `vX.Y.Z` para disparar o release.'
          else
            echo "PR de promoção já aberto: #$PR"
          fi
