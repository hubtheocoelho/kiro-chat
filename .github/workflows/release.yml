name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create/release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Build NSIS installer
        run: npm run tauri build
      - name: Remove previous release for this tag (republish)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "${{ inputs.tag }}" --cleanup-tag --yes
        continue-on-error: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
          body: |
            ## Instalação

            1. Baixe o arquivo `Kiro Chat_*_x64-setup.exe` abaixo (em **Assets**).
            2. Execute o instalador. Se o Windows SmartScreen avisar, clique em
               **"Mais informações" → "Executar assim mesmo"**.
            3. O ícone **Kiro Chat** aparece na área de trabalho. O app abre ao
               final da instalação e prepara tudo sozinho (Kiro CLI + login).

            Requisitos: Windows 11 (64 bits) e conexão com a internet.
