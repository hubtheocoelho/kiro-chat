name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create/release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer (NSIS)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Build NSIS installer
        run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux bundles (deb + AppImage, Ubuntu 22.04)
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            libfuse2 \
            xdg-utils
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Build deb + AppImage bundles
        run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: bundles
          merge-multiple: true
      - name: Remove previous release for this tag (republish)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "${{ inputs.tag }}" --repo "${{ github.repository }}" --cleanup-tag --yes
        continue-on-error: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            bundles/**/*.exe
            bundles/**/*.deb
            bundles/**/*.AppImage
          generate_release_notes: true
          body: |
            ## Instalação

            ### Windows 11 (64 bits)

            1. Baixe o arquivo `Kiro Chat_*_x64-setup.exe` abaixo (em **Assets**).
            2. Execute o instalador. Se o Windows SmartScreen avisar, clique em
               **"Mais informações" → "Executar assim mesmo"**.
            3. O ícone **Kiro Chat** aparece na área de trabalho. O app abre ao
               final da instalação e prepara tudo sozinho (Kiro CLI + login).

            ### Linux (Ubuntu 22.04+, 64 bits)

            **Opção A — pacote .deb (recomendado no Ubuntu/Debian):**

            ```bash
            sudo apt install ./Kiro.Chat_*_amd64.deb
            ```

            Depois abra **Kiro Chat** pelo menu de aplicativos (ou rode `kiro-chat`).

            **Opção B — AppImage (qualquer distro com glibc 2.35+):**

            ```bash
            chmod +x Kiro.Chat_*_amd64.AppImage
            ./Kiro.Chat_*_amd64.AppImage
            ```

            O app instala o Kiro CLI oficial em `~/.local/bin` e conduz o login
            automaticamente na primeira execução.

            Requisitos: Windows 11 (64 bits) ou Ubuntu 22.04+ (x86_64) e conexão
            com a internet.
