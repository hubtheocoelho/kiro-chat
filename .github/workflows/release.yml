name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build NSIS installer
        run: npm run tauri build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
          body: |
            ## Instalação

            1. Baixe o arquivo `Kiro Chat_*_x64-setup.exe` abaixo (em **Assets**).
            2. Execute o instalador. Se o Windows SmartScreen avisar, clique em
               **"Mais informações" → "Executar assim mesmo"**.
            3. O ícone **Kiro Chat** aparece na área de trabalho. O app abre ao
               final da instalação e prepara tudo sozinho (Kiro CLI + login).

            Requisitos: Windows 11 (64 bits) e conexão com a internet.
